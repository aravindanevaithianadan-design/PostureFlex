<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostureFlex - Clinical Posture & Squat Assessment</title>
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="/frontend/index.css">
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- jsPDF and AutoTable Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <!-- React and Babel Standalone CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root">
        <div class="loader-container" style="min-height: 100vh; background-color: #07050f;">
            <div class="spinner"></div>
            <p style="color: #9ca3af; font-family: sans-serif; font-size: 14px;">Initializing PostureFlex Platform...</p>
        </div>
    </div>
    <!-- Load App Modules -->
    <script src="/frontend/db.js"></script>
    <script src="/frontend/auth.js"></script>
    <script src="/frontend/pose.js"></script>
    <script src="/frontend/reports.js"></script>
    
    <!-- Load main React Application (compiled at runtime via Babel) -->
    <script type="text/babel" src="/frontend/app.js"></script>
</body>
</html>
